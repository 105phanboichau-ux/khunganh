<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho Phim Của Tôi</title>
    <style>
        body { background-color: #0f0f0f; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 15px; }
        .header { text-align: center; color: #ff0000; margin-bottom: 25px; font-size: 24px; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .card { background-color: #272727; border-radius: 10px; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
        .card:hover { background-color: #3d3d3d; transform: scale(1.03); }
        .thumbnail { width: 100%; height: auto; display: block; border-bottom: 3px solid #ff0000; aspect-ratio: 16/9; object-fit: cover; }
        .title { padding: 10px; font-size: 14px; font-weight: bold; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .status-msg { text-align: center; color: #aaa; margin-top: 50px; font-size: 16px; line-height: 1.6; }
        .error-box { background-color: #2a1414; border: 1px solid #ff0000; padding: 15px; border-radius: 8px; color: #ff8888; max-width: 600px; margin: 20px auto; text-align: left; }
    </style>
</head>
<body>

<div class="header">Kho Phim Của Tôi</div>
<div class="status-msg" id="status-msg">Đang tải danh sách phim từ YouTube...</div>
<div id="grid-content" class="grid"></div>

<script>
    // ================= CẤU HÌNH ĐÃ ĐƯỢC TÍCH HỢP SẴN =================
    const API_KEY = 'AIzaSyCMH96yNnOn4OjonemG-karYzXxzcLlsr8'; 
    const PLAYLIST_ID = 'PLB7OgAC8FDq8'; 
    // =================================================================

    const gridContent = document.getElementById('grid-content');
    const statusMsg = document.getElementById('status-msg');

    window.onload = loadYouTubePlaylist;

    function loadYouTubePlaylist() {
        if (!PLAYLIST_ID || PLAYLIST_ID === '') {
            statusMsg.innerHTML = '<div class="error-box">Lỗi: Chưa cấu hình PLAYLIST_ID.</div>';
            return;
        }

        const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${PLAYLIST_ID}&key=${API_KEY}`;
        
        fetch(url)
        .then(res => res.json())
        .then(data => {
            statusMsg.style.display = 'none';
            
            if (data.error) {
                statusMsg.style.display = 'block';
                statusMsg.innerHTML = `
                    <div class="error-box">
                        <strong style="color: #ff4444;">❌ LỖI PHẢN HỒI TỪ YOUTUBE API:</strong><br>
                        <strong>Nội dung:</strong> ${data.error.message}
                    </div>
                `;
                return;
            }

            if (data.items && data.items.length > 0) {
                data.items.forEach(item => {
                    const videoId = item.snippet.resourceId.videoId;
                    const title = item.snippet.title;
                    
                    let thumbnailUrl = '';
                    if (item.snippet.thumbnails) {
                        thumbnailUrl = item.snippet.thumbnails.medium ? item.snippet.thumbnails.medium.url : 
                                      (item.snippet.thumbnails.default ? item.snippet.thumbnails.default.url : '');
                    }
                    
                    if(title === "Private video" || title === "Deleted video") return;

                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    const imageHtml = thumbnailUrl ? `<img src="${thumbnailUrl}" class="thumbnail" alt="Bìa phim">` : `<div style="width: 100%; height: 100px; background: #444; display:flex; align-items:center; justify-content:center;">🎞️</div>`;
                    
                    card.innerHTML = `
                        ${imageHtml}
                        <div class="title">${title}</div>
                    `;
                    
                    // KHI BẤM VÀO: Gọi thẳng link xem chính thức để iPad tự kích hoạt App YouTube hoặc mở tab mới mượt mà
                    card.onclick = () => playYouTubeVideo(videoId);
                    gridContent.appendChild(card);
                });
            } else {
                statusMsg.style.display = 'block';
                statusMsg.innerText = "Danh sách phát trống.";
            }
        })
        .catch(err => {
            statusMsg.style.display = 'block';
            statusMsg.innerHTML = `<div class="error-box">❌ Lỗi kết nối: ${err.message}</div>`;
        });
    }

    function playYouTubeVideo(videoId) {
        // Ép mở đường link xem trực tiếp bằng tab mới, giúp gọi app YouTube nếu có
        window.open(`https://www.youtube.com/watch?v=${videoId}`, '_blank');
    }
</script>
</body>
</html>
