<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho Phim Của Tôi</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #e50914;
            margin-bottom: 30px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .card {
            background-color: #1f1f1f;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s, opacity 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 120px;
            border: 1px solid #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .card:hover:not(.empty) {
            transform: scale(1.05);
            background-color: #2a2a2a;
        }
        .card.empty {
            opacity: 0.3;
            cursor: not-allowed;
            border: 1px dashed #555;
        }
        .folder-icon { font-size: 45px; margin-bottom: 10px; color: #f4b400; }
        .movie-icon { font-size: 45px; margin-bottom: 10px; color: #4285f4; }
        .title { font-size: 14px; word-break: break-word; font-weight: bold; line-height: 1.4; }
        .btn-back {
            background-color: #e50914;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 20px;
            display: none;
        }
        .status-msg { text-align: center; font-size: 18px; color: #aaa; margin-top: 50px; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="web-title">Kho Phim Của Tôi</h1>
    <button class="btn-back" id="btn-back" onclick="goBack()">⬅ Quay lại danh sách</button>
    <div class="status-msg" id="status-msg">Đang đồng bộ dữ liệu từ Google Drive...</div>
    <div class="grid" id="grid-content"></div>
</div>

<script>
    // ================= KHÔNG GIAN CẤU HÌNH =================
    const API_KEY = 'AIzaSyCMH96yNnOn4OjonemG-karYzXxzcLlsr8'; 
    const ROOT_FOLDER_ID = '1ajEUENWGITq0aFBjR8Z82L0KDFIxOVEr';
    // =======================================================

    const gridContent = document.getElementById('grid-content');
    const statusMsg = document.getElementById('status-msg');
    const btnBack = document.getElementById('btn-back');
    const webTitle = document.getElementById('web-title');

    window.onload = function() {
        if (API_KEY.includes('THAY_THẾ')) {
            statusMsg.innerHTML = '<span style="color: #e50914; font-weight:bold;">Lỗi: Bạn chưa cấu hình API Key!</span>';
            return;
        }
        loadFolders();
    };

    function loadFolders() {
        toggleStatus(true, "Đang tải danh sách phim...");
        btnBack.style.display = 'none';
        webTitle.innerText = "Kho Phim Của Tôi";
        gridContent.innerHTML = '';

        const url = `https://www.googleapis.com/drive/v3/files?q='${ROOT_FOLDER_ID}'+in+parents+and+mimeType='application/vnd.google-apps.folder'+and+trashed=false&fields=files(id,name)&key=${API_KEY}`;

        fetch(url)
            .then(response => response.json())
            .then(data => {
                toggleStatus(false);
                if (data.files && data.files.length > 0) {
                    data.files.sort((a, b) => a.name.localeCompare(b.name));
                    data.files.forEach(folder => createFolderCard(folder));
                } else {
                    gridContent.innerHTML = '<div class="status-msg">Không tìm thấy thư mục phim.</div>';
                }
            })
            .catch(err => {
                toggleStatus(false);
                gridContent.innerHTML = '<div class="status-msg" style="color:#e50914;">Lỗi kết nối API.</div>';
            });
    }

    function createFolderCard(folder) {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<div class="folder-icon">📁</div><div class="title">${folder.name}</div>`;
        card.onclick = () => loadFiles(folder.id, folder.name);
        gridContent.appendChild(card);
    }

    function loadFiles(folderId, folderName) {
        toggleStatus(true, `Đang mở: ${folderName}...`);
        gridContent.innerHTML = '';
        btnBack.style.display = 'block';
        webTitle.innerText = folderName;

        const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+mimeType!='application/vnd.google-apps.folder'+and+trashed=false&fields=files(id,name)&key=${API_KEY}`;

        fetch(url)
            .then(response => response.json())
            .then(data => {
                toggleStatus(false);
                if (data.files && data.files.length > 0) {
                    data.files.sort((a, b) => a.name.localeCompare(b.name));
                    data.files.forEach(file => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `<div class="movie-icon">🎬</div><div class="title">${file.name}</div>`;
                        // FIX CHO IPAD CŨ: Mở link trực tiếp sang tab mới
                        card.onclick = () => {
                            const url = `https://drive.google.com/file/d/${file.id}/view`;
                            window.open(url, '_blank');
                        };
                        gridContent.appendChild(card);
                    });
                } else {
                    gridContent.innerHTML = '<div class="status-msg">Thư mục trống.</div>';
                }
            })
            .catch(err => {
                toggleStatus(false);
                gridContent.innerHTML = '<div class="status-msg" style="color:#e50914;">Lỗi tải phim.</div>';
            });
    }

    function goBack() { loadFolders(); }

    function toggleStatus(show, message = "") {
        if (show) { statusMsg.style.display = 'block'; statusMsg.innerText = message; }
        else { statusMsg.style.display = 'none'; }
    }
</script>
</body>
</html>
