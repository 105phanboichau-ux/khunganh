<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho Phim Của Tôi</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: sans-serif; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #e50914; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background-color: #1f1f1f; border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; border: 1px solid #333; }
        .card:hover { background-color: #2a2a2a; }
        /* Player mới */
        .player-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; align-items: center; justify-content: center; }
        video { width: 100%; max-height: 100%; }
        .close-btn { position: absolute; top: 10px; right: 10px; color: white; font-size: 20px; cursor: pointer; z-index: 1001; padding: 10px; background: rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="container">
    <h1 id="web-title">Kho Phim Của Tôi</h1>
    <div id="grid-content" class="grid"></div>
</div>

<div class="player-container" id="player-container">
    <div class="close-btn" onclick="closePlayer()">ĐÓNG X</div>
    <video id="video-player" controls playsinline></video>
</div>

<script>
    const API_KEY = 'AIzaSyCMH96yNnOn4OjonemG-karYzXxzcLlsr8'; 
    const ROOT_FOLDER_ID = '1ajEUENWGITq0aFBjR8Z82L0KDFIxOVEr';

    // (Các phần code loadFolders và loadFiles giữ nguyên như trước...)
    // ... bạn dán phần loadFolders và loadFiles cũ vào đây ...
    // Dưới đây là phần sửa đổi quan trọng cho hàm playMovie:

    function playMovie(fileId) {
        const videoPlayer = document.getElementById('video-player');
        const container = document.getElementById('player-container');
        
        // Link stream trực tiếp không qua giao diện Preview
        const streamUrl = `https://drive.google.com/uc?export=download&id=${fileId}`;
        
        videoPlayer.src = streamUrl;
        container.style.display = 'flex';
        videoPlayer.play();
    }

    function closePlayer() {
        const videoPlayer = document.getElementById('video-player');
        videoPlayer.pause();
        videoPlayer.src = "";
        document.getElementById('player-container').style.display = 'none';
    }
    
    // Đừng quên copy các hàm loadFolders, loadFiles từ code cũ của bạn vào đây nhé!
</script>
</body>
</html>
