<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho Phim Của Tôi</title>
    <style>
        body { background-color: #000; color: #fff; font-family: Arial, sans-serif; margin: 0; padding: 10px; }
        .header { text-align: center; color: #e50914; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .card { background-color: #222; border-radius: 8px; padding: 15px; text-align: center; cursor: pointer; border: 1px solid #444; }
        .card:hover { background-color: #333; }
        .icon { font-size: 40px; margin-bottom: 5px; }
        .title { font-size: 13px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        /* Trình phát video */
        .player-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; flex-direction: column; }
        video { width: 100%; height: 90%; background: #000; }
        .close-btn { color: #fff; padding: 15px; text-align: right; font-size: 18px; cursor: pointer; background: #222; }
        .back-btn { margin-bottom: 15px; padding: 10px; background: #e50914; border: none; color: white; border-radius: 5px; display: none; }
    </style>
</head>
<body>

<div class="header"><h1>Kho Phim Của Tôi</h1></div>
<button id="back-btn" class="back-btn" onclick="loadFolders()">⬅ Quay lại</button>
<div id="grid-content" class="grid"></div>

<div id="player-container" class="player-container">
    <div class="close-btn" onclick="closePlayer()">ĐÓNG X</div>
    <video id="video-player" controls playsinline></video>
</div>

<script>
    // --- CẤU HÌNH ---
    const API_KEY = 'AIzaSyCMH96yNnOn4OjonemG-karYzXxzcLlsr8'; // API Key của bạn
    const ROOT_FOLDER_ID = '1ajEUENWGITq0aFBjR8Z82L0KDFIxOVEr'; // ID thư mục Phimtin

    const gridContent = document.getElementById('grid-content');
    const backBtn = document.getElementById('back-btn');

    window.onload = loadFolders;

    function loadFolders() {
        backBtn.style.display = 'none';
        gridContent.innerHTML = 'Đang tải...';
        const url = `https://www.googleapis.com/drive/v3/files?q='${ROOT_FOLDER_ID}'+in+parents+and+mimeType='application/vnd.google-apps.folder'&fields=files(id,name)&key=${API_KEY}`;
        
        fetch(url).then(res => res.json()).then(data => {
            gridContent.innerHTML = '';
            data.files.forEach(folder => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<div class="icon">📁</div><div class="title">${folder.name}</div>`;
                div.onclick = () => loadFiles(folder.id);
                gridContent.appendChild(div);
            });
        });
    }

    function loadFiles(folderId) {
        backBtn.style.display = 'block';
        gridContent.innerHTML = 'Đang tải phim...';
        const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+mimeType!='application/vnd.google-apps.folder'&fields=files(id,name)&key=${API_KEY}`;
        
        fetch(url).then(res => res.json()).then(data => {
            gridContent.innerHTML = '';
            data.files.forEach(file => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<div class="icon">🎬</div><div class="title">${file.name}</div>`;
                div.onclick = () => playMovie(file.id);
                gridContent.appendChild(div);
            });
        });
    }

    function playMovie(fileId) {
        // Link trực tiếp, trình duyệt sẽ tự tải file video về thay vì load web Google Drive
        const streamUrl = `https://drive.google.com/uc?export=open&id=${fileId}`;
        const player = document.getElementById('video-player');
        player.src = streamUrl;
        document.getElementById('player-container').style.display = 'flex';
        player.play();
    }

    function closePlayer() {
        const player = document.getElementById('video-player');
        player.pause();
        player.src = "";
        document.getElementById('player-container').style.display = 'none';
    }
</script>
</body>
</html>
