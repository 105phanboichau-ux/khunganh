<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho Phim Của Tôi</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #e50914;
            margin-bottom: 30px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .card {
            background-color: #1f1f1f;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s, opacity 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 120px;
            border: 1px solid #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .card:hover:not(.empty) {
            transform: scale(1.05);
            background-color: #2a2a2a;
        }
        /* Style làm mờ cho các ô chưa có phim */
        .card.empty {
            opacity: 0.3;
            cursor: not-allowed;
            border: 1px dashed #555;
        }
        .folder-icon {
            font-size: 45px;
            margin-bottom: 10px;
            color: #f4b400;
        }
        .movie-icon {
            font-size: 45px;
            margin-bottom: 10px;
            color: #4285f4;
        }
        .title {
            font-size: 14px;
            word-break: break-word;
            font-weight: bold;
            line-height: 1.4;
        }
        .btn-back {
            background-color: #e50914;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 20px;
            display: none;
        }
        .btn-back:hover {
            background-color: #b80710;
        }
        /* Trình phát phim tràn màn hình */
        .player-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.95);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .player-frame {
            width: 90%;
            height: 80%;
            border: none;
            background: #000;
            border-radius: 8px;
        }
        .btn-close-player {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #e50914;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        .status-msg {
            text-align: center;
            font-size: 18px;
            color: #aaa;
            margin-top: 50px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="web-title">Kho Phim Của Tôi</h1>
    <button class="btn-back" id="btn-back" onclick="goBack()">⬅ Quay lại danh sách</button>
    <div class="status-msg" id="status-msg">Đang đồng bộ dữ liệu từ Google Drive...</div>
    <div class="grid" id="grid-content"></div>
</div>

<div class="player-container" id="player-container">
    <button class="btn-close-player" onclick="closePlayer()">Đóng X</button>
    <iframe class="player-frame" id="player-frame" src="" allow="autoplay" allowfullscreen></iframe>
</div>

<script>
    // ================= KHÔNG GIAN CẤU HÌNH =================
    // 1. Nhập API Key của bạn vào đây (Bắt buộc phải có để quét dữ liệu công khai công khai)
    const API_KEY = 'AIzaSyCMH96yNnOn4OjonemG-karYzXxzcLlsr8'; 
    // ID thư mục gốc "Phimtin" lấy từ link của bạn
    const ROOT_FOLDER_ID = '1ajEUENWGITq0aFBjR8Z82L0KDFIxOVEr';
    // =======================================================

    const gridContent = document.getElementById('grid-content');
    const statusMsg = document.getElementById('status-msg');
    const btnBack = document.getElementById('btn-back');
    const webTitle = document.getElementById('web-title');
    const playerContainer = document.getElementById('player-container');
    const playerFrame = document.getElementById('player-frame');

    window.onload = function() {
        if (API_KEY === 'THAY_THẾ_BẰNG_API_KEY_CỦA_BẠN') {
            statusMsg.innerHTML = '<span style="color: #e50914; font-weight:bold;">Lỗi: Bạn chưa cấu hình API Key trong file HTML!</span>';
            return;
        }
        loadFolders();
    };

    // Bước 1: Quét danh sách tất cả thư mục con nằm trong thư mục gốc
    function loadFolders() {
        toggleStatus(true, "Đang tải danh sách các bộ phim...");
        btnBack.style.display = 'none';
        webTitle.innerText = "Kho Phim Của Tôi";
        gridContent.innerHTML = '';

        const url = `https://www.googleapis.com/drive/v3/files?q='${ROOT_FOLDER_ID}'+in+parents+and+mimeType='application/vnd.google-apps.folder'+and+trashed=false&fields=files(id,name)&key=${API_KEY}`;

        fetch(url)
            .then(response => response.json())
            .then(data => {
                toggleStatus(false);
                if (data.files && data.files.length > 0) {
                    // Sắp xếp tên phim theo bảng chữ cái A-Z
                    data.files.sort((a, b) => a.name.localeCompare(b.name));
                    
                    data.files.forEach(folder => {
                        createFolderCard(folder);
                    });
                } else {
                    gridContent.innerHTML = '<div class="status-msg">Không tìm thấy thư mục phim nào trong thư mục gốc.</div>';
                }
            })
            .catch(error => {
                console.error(error);
                toggleStatus(false);
                gridContent.innerHTML = '<div class="status-msg" style="color:#e50914;">Không thể kết nối tới Google Drive. Vui lòng kiểm tra lại cấu hình API Key.</div>';
            });
    }

    // Bước 2: Hiển thị các ô Thư mục và quét ngầm xem có nội dung không để làm mờ
    function createFolderCard(folder) {
        const card = document.createElement('div');
        card.className = 'card';
        card.id = `folder-${folder.id}`;
        card.innerHTML = `
            <div class="folder-icon">📁</div>
            <div class="title">${folder.name}</div>
        `;
        
        card.onclick = function() {
            if(!card.classList.contains('empty')) {
                loadFiles(folder.id, folder.name);
            }
        };
        
        gridContent.appendChild(card);

        // Quét ngầm kiểm tra xem thư mục con này có chứa file nào không
        checkIfFolderEmpty(folder.id, card);
    }

    // Kiểm tra nhanh sự tồn tại của file trong thư mục con để áp dụng hiệu ứng mờ mờ (.empty)
    function checkIfFolderEmpty(folderId, cardElement) {
        const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&pageSize=1&fields=files(id)&key=${API_KEY}`;
        fetch(url)
            .then(response => response.json())
            .then(data => {
                if (!data.files || data.files.length === 0) {
                    cardElement.classList.add('empty'); // Thêm class làm mờ nếu trống
                }
            })
            .catch(err => console.log("Lỗi kiểm tra dữ liệu: " + err));
    }

    // Bước 3: Khi bấm vào thư mục, quét toàn bộ file phim bên trong
    function loadFiles(folderId, folderName) {
        toggleStatus(true, `Đang mở bộ phim: ${folderName}...`);
        gridContent.innerHTML = '';
        btnBack.style.display = 'block';
        webTitle.innerText = folderName;

        // Lấy tất cả các file ngoại trừ các thư mục con bên trong nó
        const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+mimeType!='application/vnd.google-apps.folder'+and+trashed=false&fields=files(id,name)&key=${API_KEY}`;

        fetch(url)
            .then(response => response.json())
            .then(data => {
                toggleStatus(false);
                if (data.files && data.files.length > 0) {
                    data.files.sort((a, b) => a.name.localeCompare(b.name));
                    
                    data.files.forEach(file => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <div class="movie-icon">🎬</div>
                            <div class="title">${file.name}</div>
                        `;
                        card.onclick = function() {
                            playMovie(file.id);
                        };
                        gridContent.appendChild(card);
                    });
                } else {
                    gridContent.innerHTML = '<div class="status-msg">Thư mục này hiện tại không có file phát được.</div>';
                }
            })
            .catch(error => {
                console.error(error);
                toggleStatus(false);
                gridContent.innerHTML = '<div class="status-msg" style="color:#e50914;">Lỗi khi tải danh sách tập phim.</div>';
            });
    }

    // Bước 4: Kích hoạt trình phát video bằng link Preview của Google Drive
    function playMovie(fileId) {
        const embedUrl = `https://drive.google.com/file/d/${fileId}/preview`;
        playerFrame.src = embedUrl;
        playerContainer.style.display = 'flex';
    }

    function closePlayer() {
        playerContainer.style.display = 'none';
        playerFrame.src = ''; // Xóa nguồn để dừng phát âm thanh ngầm khi đóng trình phát
    }

    function goBack() {
        loadFolders();
    }

    function toggleStatus(show, message = "") {
        if (show) {
            statusMsg.style.display = 'block';
            statusMsg.innerText = message;
        } else {
            statusMsg.style.display = 'none';
        }
    }
</script>
</body>
</html>
