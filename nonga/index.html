            {

                description: "Phân biệt chất bám dính, loang trải và dầu khoáng. Sử dụng khi nào?",

        // =========================================================================
        // 2. GIAO DIỆN ICONS (SVG)
        // =========================================================================
        function ChevronIcon({ isOpen }) {
            return <svg className={`h-4 w-4 text-white/60 transition-transform duration-200 ${isOpen ? "rotate-180" : ""}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7" /></svg>;
        }
        function CalendarIcon({ isActive }) { return <svg className={`h-5 w-5 ${isActive ? "text-white" : "text-white/60 group-hover:text-white"}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>; }
        function StarIcon({ isActive }) { return <svg className={`h-5 w-5 ${isActive ? "text-white" : "text-white/60 group-hover:text-white"}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" /></svg>; }
        function CheckCircleIcon({ isActive }) { return <svg className={`h-5 w-5 ${isActive ? "text-white" : "text-white/60 group-hover:text-white"}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>; }
        function LeafIcon({ isActive }) { return <svg className={`h-5 w-5 ${isActive ? "text-white" : "text-white/60 group-hover:text-white"}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M3 21c3 0 7-1 7-8V5c0-1.25 1-2 2-2h4c2 0 4 1.5 4 4v2c0 4-4 6-9 6h-2v6H3z" /></svg>; }
        function ClockIcon({ isActive }) { return <svg className={`h-5 w-5 ${isActive ? "text-white" : "text-white/60 group-hover:text-white"}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>; }
        function BookOpenIcon({ isActive }) { return <svg className={`h-5 w-5 ${isActive ? "text-white" : "text-white/60 group-hover:text-white"}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>; }
        function PhoneIcon({ isActive }) { return <svg className={`h-5 w-5 ${isActive ? "text-white" : "text-white/60 group-hover:text-white"}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" /></svg>; }

        // =========================================================================
        // 3. GIAO DIỆN THẺ BÀI HỌC (LESSON CARD)
        // =========================================================================
        function LessonCard({ lesson, onClick }) {
            const hasImage = lesson.thumbnail || lesson.youtubeId;
            const imageUrl = lesson.thumbnail ? lesson.thumbnail : (lesson.youtubeId ? `https://img.youtube.com/vi/${lesson.youtubeId}/maxresdefault.jpg` : null);

            return (
                <div onClick={onClick} className="group flex cursor-pointer flex-col overflow-hidden rounded-xl border border-[#E5E5E5] bg-white shadow-sm transition-all hover:-translate-y-1 hover:shadow-md">
                    <div className={`relative aspect-[2/1] w-full overflow-hidden flex items-center justify-center ${!hasImage ? 'bg-gradient-to-br from-[#0176D3] to-[#045c9e]' : 'bg-black'}`}>
                        {hasImage ? (
                            <React.Fragment>
                                <img src={imageUrl} alt={lesson.title} className="h-full w-full object-cover opacity-90 transition-transform duration-300 group-hover:scale-105 group-hover:opacity-100" onError={(e) => { e.currentTarget.src = `https://img.youtube.com/vi/${lesson.youtubeId}/0.jpg`; }} />
                                {lesson.youtubeId && (
                                    <div className="absolute inset-0 flex items-center justify-center">
                                        <div className="flex h-14 w-14 items-center justify-center rounded-full bg-black/60 text-white backdrop-blur-sm transition-colors group-hover:bg-[#FF0000]">
                                            <svg className="h-7 w-7 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" /></svg>
                                        </div>
                                    </div>
                                )}
                            </React.Fragment>
                        ) : (
                            <span className="text-6xl transition-transform duration-300 group-hover:scale-110">{lesson.icon || "📚"}</span>
                        )}
                    </div>
                    <div className="flex flex-1 flex-col p-5">
                        <div className="mb-2 flex items-center gap-3 text-xs font-semibold text-[#706E6B]">
                            <span className="text-[#E87722]">⭐ {lesson.points || 100} điểm</span>
                            <span>•</span>
                            <span>{lesson.duration || "15 phút"}</span>
                        </div>
                        <h3 className="mb-4 line-clamp-2 text-lg font-bold text-[#181818] group-hover:text-[#0176D3]">{lesson.title}</h3>
                        <div className="mt-auto">
                            <button className="w-full rounded-lg bg-[#0176D3] py-2.5 text-sm font-semibold text-white transition-colors hover:bg-[#014486]">Xem nội dung</button>
                        </div>
                    </div>
                </div>
            );
        }

        // =========================================================================
        // 4. GIAO DIỆN MENU TRÁI (SIDEBAR)
        // =========================================================================
        function Sidebar({ activeCategory, onSelectCategory }) {
            const [openDropdowns, setOpenDropdowns] = useState({ "menu-cay": false, "menu-thang": false });

            const toggleDropdown = (menuId) => {
                setOpenDropdowns(prev => ({ ...prev, [menuId]: !prev[menuId] }));
            };

            const menuSections = [
                {
                    title: "LỘ TRÌNH HỌC",
                    items: [
                        { name: "Tuần 1", id: "tuan-1", icon: CalendarIcon },
                        { name: "Tuần 2", id: "tuan-2", icon: CalendarIcon },
                        { name: "Tuần 3", id: "tuan-3", icon: CalendarIcon },
                        { name: "Tuần 4", id: "tuan-4", icon: CalendarIcon },
                        { name: "Nâng cao", id: "nang-cao", icon: StarIcon },
                        { name: "Kiểm tra", id: "kiem-tra", icon: CheckCircleIcon },
                    ],
                },
                {
                    title: "CÔNG CỤ & TÀI LIỆU",
                    items: [
                       // 👇 THÊM MỤC MỚI VÀO ĐÂY 👇
      { name: "Hoạt chất trị bệnh", id: "hoat-chat-tri-benh", icon: BookOpenIcon },
      // 👆 KẾT THÚC THÊM MỚI 👆
                        { name: "Bài thuốc theo cây", id: "menu-cay", icon: LeafIcon,
                            subItems: [
                                { name: "Cà phê", id: "cay-ca-phe" }, { name: "Tiêu", id: "cay-tieu" },
                                { name: "Sầu Riêng", id: "cay-sau-rieng" }, { name: "Lúa", id: "cay-lua" },
                                { name: "Nhãn Vải", id: "cay-nhan-vai" }, { name: "Rau", id: "cay-rau" },
                                { name: "Bắp - Hoa", id: "cay-bap-hoa" },
                            ]
                        },
                        { 
                            name: "Bài thuốc theo tháng", id: "menu-thang", icon: ClockIcon,
                            subItems: [
                                { name: "Tháng 1", id: "thang-1" }, { name: "Tháng 2", id: "thang-2" },
                                { name: "Tháng 3", id: "thang-3" }, { name: "Tháng 4", id: "thang-4" },
                                { name: "Tháng 5", id: "thang-5" }, { name: "Tháng 6", id: "thang-6" },
                                { name: "Tháng 7", id: "thang-7" }, { name: "Tháng 8", id: "thang-8" },
                                { name: "Tháng 9", id: "thang-9" }, { name: "Tháng 10", id: "thang-10" },
                                { name: "Tháng 11", id: "thang-11" }, { name: "Tháng 12", id: "thang-12" },
                            ]
                        },
                        { name: "Kiến thức hay", id: "kien-thuc-hay", icon: BookOpenIcon },
                        { name: "Danh bạ", id: "danh-ba", icon: PhoneIcon },
                    ],
                },
            ];

            return (
                <aside className="flex h-screen w-64 flex-shrink-0 flex-col bg-[#032D60] text-white">
                    <div className="flex items-center gap-3 border-b border-white/10 px-6 py-6">
                        <div className="flex h-10 w-10 flex-shrink-0 items-center justify-center rounded-full bg-[#0176D3]">
                            <svg className="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                                <path strokeLinecap="round" strokeLinejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                <path strokeLinecap="round" strokeLinejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                        </div>
                        <div>
                            <p className="text-[10px] font-bold uppercase tracking-wider text-white/70">Agriculture</p>
                            <h1 className="text-xl font-bold tracking-tight">Trailhead</h1>
                        </div>
                    </div>
                    <nav className="flex-1 overflow-y-auto px-4 py-6">
                        <div className="space-y-8">
                            {menuSections.map((section, idx) => (
                                <div key={idx}>
                                    <h2 className="mb-3 px-2 text-xs font-bold uppercase tracking-wider text-white/60">{section.title}</h2>
                                    <ul className="space-y-1">
                                        {section.items.map((item) => {
                                            const hasSubItems = item.subItems && item.subItems.length > 0;
                                            const isChildActive = hasSubItems && item.subItems.some(sub => sub.id === activeCategory);
                                            const isActive = activeCategory === item.id || isChildActive;
                                            const isOpen = openDropdowns[item.id] || isChildActive;

                                            return (
                                                <li key={item.id} className="flex flex-col">
                                                    <button
                                                        onClick={() => { hasSubItems ? toggleDropdown(item.id) : onSelectCategory(item.id); }}
                                                        className={`group flex w-full items-center justify-between rounded-lg px-3 py-2.5 transition-all ${isActive ? "bg-[#0176D3] font-semibold text-white shadow-sm" : "text-white/80 hover:bg-white/10 hover:text-white"}`}
                                                    >
                                                        <div className="flex items-center gap-3">
                                                            <item.icon isActive={isActive} />
                                                            <span className="text-[15px]">{item.name}</span>
                                                        </div>
                                                        {hasSubItems ? <ChevronIcon isOpen={isOpen} /> : (isActive && <div className="h-2 w-2 rounded-full bg-white/80" />)}
                                                    </button>
                                                    {hasSubItems && isOpen && (
                                                        <ul className="ml-7 mt-1 space-y-1 border-l border-white/20 pl-2">
                                                            {item.subItems.map(sub => {
                                                                const isSubActive = activeCategory === sub.id;
                                                                return (
                                                                    <li key={sub.id}>
                                                                        <button onClick={() => onSelectCategory(sub.id)} className={`w-full rounded-md px-3 py-2 text-left text-[14px] transition-colors ${isSubActive ? "bg-white/15 font-semibold text-white" : "text-white/60 hover:bg-white/10 hover:text-white"}`}>{sub.name}</button>
                                                                    </li>
                                                                );
                                                            })}
                                                        </ul>
                                                    )}
                                                </li>
                                            );
                                        })}
                                    </ul>
                                </div>
                            ))}
                        </div>
                    </nav>
                </aside>
            );
        }

        // =========================================================================
        // 5. GIAO DIỆN BẢNG ĐIỀU KHIỂN CHÍNH (DASHBOARD)
        // =========================================================================
        function Dashboard() {
            const [activeCategory, setActiveCategory] = useState("tuan-1");
            const [selectedLesson, setSelectedLesson] = useState(null);

            const filteredLessons = lessons.filter(lesson => lesson.categoryId === activeCategory);

            return (
                <div className="flex h-screen w-full overflow-hidden bg-[#F3F2F2]">
                    <Sidebar activeCategory={activeCategory} onSelectCategory={setActiveCategory} />
                    
                    <main className="flex-1 overflow-y-auto p-8">
                        <div className="mx-auto max-w-[1400px]">
                            <div className="mb-8 rounded-xl border border-[#CFE9FE] bg-[#EEF4FF] p-4 text-sm text-[#014486]">
                                ℹ️ Chào mừng bạn đến với Nông Á Newgen. Hãy chọn bài học để bắt đầu.
                            </div>
                            
                            <h2 className="mb-6 text-2xl font-bold text-[#181818] uppercase">NỘI DUNG: {activeCategory.replace(/-/g, " ")}</h2>

                            {filteredLessons.length > 0 ? (
                                <div className="grid grid-cols-1 gap-6 md:grid-cols-2 lg:grid-cols-3">
                                    {filteredLessons.map(lesson => (
                                        <LessonCard key={lesson.id} lesson={lesson} onClick={() => setSelectedLesson(lesson)} />
                                    ))}
                                </div>
                            ) : (
                                <div className="mt-10 flex flex-col items-center justify-center rounded-xl border-2 border-dashed border-[#CFE9FE] bg-white p-12 text-center">
                                    <span className="text-4xl mb-4">🚧</span>
                                    <h3 className="text-lg font-bold text-[#181818]">Chưa có bài học</h3>
                                </div>
                            )}
                        </div>
                    </main>

                    {selectedLesson && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/75 p-4 backdrop-blur-sm">
                            <button onClick={() => setSelectedLesson(null)} className="absolute right-6 top-6 text-white hover:text-gray-300 transition-transform hover:rotate-90 z-[60]">
                                <svg className="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                            </button>

                            <div className="flex h-[90vh] w-full max-w-6xl flex-col overflow-hidden rounded-2xl bg-white shadow-2xl lg:flex-row">
                                <div className="w-full bg-[#032D60] lg:w-3/5 flex flex-col items-center justify-center relative">
                                    {selectedLesson.youtubeId ? (
                                        <div className="relative h-full w-full bg-black">
                                            <iframe
                                                className="absolute inset-0 h-full w-full"
                                                src={`https://www.youtube-nocookie.com/embed/${selectedLesson.youtubeId}?autoplay=1&modestbranding=1&rel=0&fs=0`}
                                                title={selectedLesson.title}
                                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                                                sandbox="allow-scripts allow-same-origin allow-presentation"
                                            ></iframe>
                                            <div className="absolute top-0 left-0 right-0 h-16 z-10 bg-transparent cursor-default"></div>
                                            <div className="absolute bottom-0 right-0 h-14 w-24 z-10 bg-transparent cursor-default"></div>
                                        </div>
                                    ) : selectedLesson.thumbnail ? (
                                        <img src={selectedLesson.thumbnail} alt={selectedLesson.title} className="h-full w-full object-cover" />
                                    ) : (
                                        <div className="flex flex-col items-center justify-center p-10 text-center text-white">
                                            <span className="text-8xl mb-6">{selectedLesson.icon || "📚"}</span>
                                        </div>
                                    )}
                                </div>
                                <div className="flex w-full flex-col bg-white lg:w-2/5">
                                    <div className="border-b border-[#E5E5E5] bg-gray-50 px-8 py-6">
                                        <div className="mb-2 flex items-center gap-3 text-xs font-semibold">
                                            <span className="rounded-full bg-[#FFF3E0] px-3 py-1 text-[#E87722]">⭐ {selectedLesson.points} điểm</span>
                                            <span className="text-[#706E6B]">{selectedLesson.duration}</span>
                                        </div>
                                        <h2 className="text-2xl font-bold text-[#181818]">{selectedLesson.title}</h2>
                                    </div>
                                    <div className="prose prose-sm flex-1 overflow-y-auto px-8 py-6 text-[#444444]" dangerouslySetInnerHTML={{ __html: selectedLesson.content || "<p>Nội dung đang cập nhật...</p>" }} />
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // =========================================================================
        // 6. ỨNG DỤNG CHÍNH (XỬ LÝ ĐĂNG NHẬP)
        // =========================================================================
        function App() {
            // Mật khẩu truy cập hệ thống
            const CORRECT_PASSWORD = "nonganewgen2026"; 

            const [password, setPassword] = useState("");
            const [isAuthorized, setIsAuthorized] = useState(false);
            const [error, setError] = useState("");
            const [isLoading, setIsLoading] = useState(true);

            useEffect(() => {
                const authStatus = sessionStorage.getItem("web_authorized");
                if (authStatus === "true") setIsAuthorized(true);
                setIsLoading(false);
            }, []);

            const handleLogin = (e) => {
                e.preventDefault();
                if (password === CORRECT_PASSWORD) {
                    sessionStorage.setItem("web_authorized", "true");
                    setIsAuthorized(true);
                    setError("");
                } else {
                    setError("❌ Mật khẩu không chính xác. Vui lòng kiểm tra lại!");
                }
            };

            if (isLoading) return <div className="min-h-screen bg-[#032D60]"></div>;
            if (isAuthorized) return <Dashboard />;

            return (
                <div className="flex min-h-screen items-center justify-center bg-[#F3F2F2] p-4">
                    <div className="w-full max-w-md overflow-hidden rounded-2xl border border-[#E5E5E5] bg-white shadow-xl">
                        <div className="bg-[#032D60] px-6 py-8 text-center text-white">
                            <div className="mx-auto mb-3 flex h-14 w-14 items-center justify-center rounded-full bg-[#0176D3] shadow-md">
                                <svg className="h-7 w-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                            </div>
                            <h1 className="text-2xl font-bold tracking-tight">Hệ Thống Nội Bộ</h1>
                            <p className="mt-1 text-sm text-white/70">Nền tảng đào tạo kỹ thuật nông nghiệp Newgen</p>
                        </div>
                        <form onSubmit={handleLogin} className="p-6 space-y-5">
                            <div>
                                <label className="block text-xs font-bold uppercase tracking-wider text-[#706E6B] mb-2">Nhập mã khóa truy cập:</label>
                                <input type="password" placeholder="••••••••" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full rounded-lg border border-[#E5E5E5] px-4 py-3 text-lg transition-all focus:border-[#0176D3] focus:outline-none focus:ring-2 focus:ring-[#0176D3]/20" required />
                            </div>
                            {error && <p className="text-sm font-semibold text-[#C23934] bg-[#FFEAEA] p-3 rounded-lg border border-[#FCD2D2]">{error}</p>}
                            <button type="submit" className="w-full rounded-lg bg-[#0176D3] py-3 text-center text-base font-bold text-white shadow-md transition-all hover:bg-[#014486] focus:outline-none focus:ring-2 focus:ring-[#0176D3]/50">Mở khóa hệ thống</button>
                        </form>
                        <div className="border-t border-[#E5E5E5] bg-gray-50 px-6 py-4 text-center text-xs text-[#706E6B]">
                            Chỉ dành cho nhân viên và đại lý ủy quyền. <br/>Mọi hành vi truy cập trái phép sẽ bị ghi lại lịch sử.
                        </div>
                    </div>
                </div>
            );
        }

        // =========================================================================
        // 7. KHỞI CHẠY ỨNG DỤNG
        // =========================================================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
